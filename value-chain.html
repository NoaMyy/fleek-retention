<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sainsbury's Value Chain</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --t1: #f59e0b;
    --t2: #10b981;
    --t3: #3b82f6;
    --t4: #8b5cf6;
    --t5: #06b6d4;
    --t6: #22c55e;
    --t7: #6366f1;
    --t8: #64748b;
    --plan: #f97316;
    --buy: #3b82f6;
    --move: #8b5cf6;
    --sell: #10b981;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #94a3b8;
    --header-h: 64px;
    --sidebar-w: 0px;
  }

  html, body { height: 100%; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  /* ── TOP BAR ── */
  .topbar {
    height: var(--header-h);
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .topbar-title { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
  .topbar-divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

  /* territory filter chips */
  .filters { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; align-items: center; }
  .filters::-webkit-scrollbar { display: none; }

  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all .15s; white-space: nowrap; user-select: none;
    background: var(--bg);
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .chip.active { color: white; border-color: transparent; }
  .chip:not(.active) { color: var(--text); border-color: var(--border); }
  .chip:not(.active):hover { border-color: var(--chip-color); color: var(--chip-color); background: white; }

  .chip[data-t="all"] { --chip-color: var(--text); }
  .chip[data-t="all"].active { background: var(--text); }
  .chip[data-t="T1"] { --chip-color: var(--t1); }
  .chip[data-t="T1"].active { background: var(--t1); }
  .chip[data-t="T2"] { --chip-color: var(--t2); }
  .chip[data-t="T2"].active { background: var(--t2); }
  .chip[data-t="T3"] { --chip-color: var(--t3); }
  .chip[data-t="T3"].active { background: var(--t3); }
  .chip[data-t="T4"] { --chip-color: var(--t4); }
  .chip[data-t="T4"].active { background: var(--t4); }
  .chip[data-t="T5"] { --chip-color: var(--t5); }
  .chip[data-t="T5"].active { background: var(--t5); }
  .chip[data-t="T6"] { --chip-color: var(--t6); }
  .chip[data-t="T6"].active { background: var(--t6); }
  .chip[data-t="T7"] { --chip-color: var(--t7); }
  .chip[data-t="T7"].active { background: var(--t7); }
  .chip[data-t="T8"] { --chip-color: var(--t8); }
  .chip[data-t="T8"].active { background: var(--t8); }

  /* ── SCROLL CANVAS ── */
  .canvas {
    margin-top: var(--header-h);
    height: calc(100vh - var(--header-h));
    overflow-x: auto;
    overflow-y: auto;
    padding: 24px 24px 40px;
    display: flex;
    gap: 0;
    align-items: flex-start;
  }
  .canvas::-webkit-scrollbar { height: 6px; width: 6px; }
  .canvas::-webkit-scrollbar-track { background: transparent; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── PHASE COLUMNS ── */
  .phase-col {
    display: flex;
    flex-direction: column;
    min-width: 210px;
    flex-shrink: 0;
    position: relative;
  }
  .phase-col + .phase-col { margin-left: 2px; }
  .phase-col + .phase-col::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .phase-header {
    padding: 10px 16px 12px;
    font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    border-bottom: 3px solid;
    margin-bottom: 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .phase-col[data-phase="Plan"] .phase-header { color: var(--plan); border-color: var(--plan); }
  .phase-col[data-phase="Buy"]  .phase-header { color: var(--buy);  border-color: var(--buy);  }
  .phase-col[data-phase="Move"] .phase-header { color: var(--move); border-color: var(--move); }
  .phase-col[data-phase="Sell"] .phase-header { color: var(--sell); border-color: var(--sell); }

  .phase-count { float: right; opacity: .5; font-size: 10px; font-weight: 400; letter-spacing: 0; text-transform: none; margin-top: 1px; }

  /* ── ACTIVITY CARDS ── */
  .activity-cards { display: flex; flex-direction: column; gap: 8px; padding: 0 8px 8px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 12px 10px;
    cursor: pointer;
    transition: opacity .2s, box-shadow .15s, transform .1s;
    position: relative;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-1px); }
  .card.dimmed { opacity: .25; pointer-events: none; }
  .card.focused { box-shadow: 0 0 0 2px var(--focus-color, #3b82f6), 0 4px 16px rgba(0,0,0,.1); }

  /* heat bar on left */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: var(--heat-color, transparent);
    opacity: var(--heat-opacity, 0);
  }

  .card-num { font-size: 10px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
  .card-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .card-dots { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .tdot {
    width: 20px; height: 20px; border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: white;
    cursor: pointer; position: relative; flex-shrink: 0;
    transition: transform .1s, box-shadow .1s;
  }
  .tdot:hover { transform: scale(1.2); box-shadow: 0 2px 6px rgba(0,0,0,.15); z-index: 5; }
  .tdot[data-t="T1"] { background: var(--t1); }
  .tdot[data-t="T2"] { background: var(--t2); }
  .tdot[data-t="T3"] { background: var(--t3); }
  .tdot[data-t="T4"] { background: var(--t4); }
  .tdot[data-t="T5"] { background: var(--t5); }
  .tdot[data-t="T6"] { background: var(--t6); }
  .tdot[data-t="T7"] { background: var(--t7); }
  .tdot[data-t="T8"] { background: var(--t8); }

  /* heat count badge */
  .heat-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; font-weight: 700; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px; line-height: 1.4;
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed;
    z-index: 9999;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
    padding: 14px 16px;
    max-width: 300px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s;
    font-size: 12px;
    line-height: 1.5;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .tooltip-type { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin-bottom: 8px; }
  .tooltip-body { color: #475569; }

  /* ── DETAIL PANEL ── */
  .panel {
    position: fixed;
    right: 0; top: var(--header-h); bottom: 0;
    width: 380px;
    background: white;
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 24px rgba(0,0,0,.07);
    transform: translateX(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    z-index: 50;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .panel.open { transform: translateX(0); }

  .panel-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--muted); line-height: 1;
  }
  .panel-close:hover { background: white; color: var(--text); }

  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-phase { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  .panel-num { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .panel-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .panel-desc { margin-top: 8px; font-size: 12px; color: #475569; line-height: 1.6; }

  .panel-body { padding: 16px 20px; flex: 1; }
  .panel-section-title { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .territory-item {
    display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start;
  }
  .territory-pill {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 20px; border-radius: 4px; font-size: 9px; font-weight: 700;
    color: white; flex-shrink: 0; margin-top: 1px;
  }
  .territory-item-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .territory-item-desc { font-size: 11px; color: #475569; line-height: 1.5; }

  /* ── TERRITORY FOCUS MODE ── */
  .focus-banner {
    display: none;
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text);
    color: white;
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 12px; font-weight: 500;
    z-index: 200;
    align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
    cursor: pointer;
    white-space: nowrap;
  }
  .focus-banner.show { display: flex; }
  .focus-banner span { opacity: .6; }

  /* scrollbar */
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-title">Value Chain</div>
  <div class="topbar-divider"></div>
  <div class="filters" id="filters">
    <div class="chip active" data-t="all"><span>All</span></div>
    <div class="chip" data-t="T1"><span class="dot" style="background:var(--t1)"></span>T1 · Adaptive Customer</div>
    <div class="chip" data-t="T2"><span class="dot" style="background:var(--t2)"></span>T2 · Living Store</div>
    <div class="chip" data-t="T3"><span class="dot" style="background:var(--t3)"></span>T3 · Autonomous Loop</div>
    <div class="chip" data-t="T4"><span class="dot" style="background:var(--t4)"></span>T4 · On-Demand Conv.</div>
    <div class="chip" data-t="T5"><span class="dot" style="background:var(--t5)"></span>T5 · Platform</div>
    <div class="chip" data-t="T6"><span class="dot" style="background:var(--t6)"></span>T6 · Better Food</div>
    <div class="chip" data-t="T7"><span class="dot" style="background:var(--t7)"></span>T7 · AI Enterprise</div>
    <div class="chip" data-t="T8"><span class="dot" style="background:var(--t8)"></span>T8 · Data & Trust</div>
  </div>
</header>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-type" id="tt-type"></div>
  <div class="tooltip-body" id="tt-body"></div>
</div>

<!-- DETAIL PANEL -->
<div class="panel" id="panel">
  <button class="panel-close" id="panel-close">×</button>
  <div class="panel-header">
    <div class="panel-phase" id="p-phase"></div>
    <div class="panel-num" id="p-num"></div>
    <div class="panel-name" id="p-name"></div>
    <div class="panel-desc" id="p-desc"></div>
  </div>
  <div class="panel-body">
    <div class="panel-section-title">Territory Connections</div>
    <div id="p-territories"></div>
  </div>
</div>

<!-- MAIN CANVAS -->
<main class="canvas" id="canvas"></main>

<!-- FOCUS BANNER -->
<div class="focus-banner" id="focus-banner">
  <span>Viewing</span> <strong id="focus-label"></strong> · <span>click to clear</span>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const PHASES = ['Plan','Buy','Move','Sell'];

const PHASE_COLORS = { Plan:'#f97316', Buy:'#3b82f6', Move:'#8b5cf6', Sell:'#10b981' };

const T_COLORS = {
  T1:'#f59e0b', T2:'#10b981', T3:'#3b82f6', T4:'#8b5cf6',
  T5:'#06b6d4', T6:'#22c55e', T7:'#6366f1', T8:'#64748b'
};

const TERRITORIES = {
  T1: { name:'The Adaptive Customer Relationship', type:'Strategic', short:'Adaptive Customer Relationship',
    desc:'Sainsbury\'s relationship with each customer becomes continuous, individual-level and AI-mediated. The offer is personalised, the service is adaptive, and the operating environment responds to customer signals at household and aggregate level.' },

  T5: { name:'The Platform Business', type:'Strategic', short:'Platform Business',
    desc:'Sainsbury\'s builds a commercial platform on top of its grocery operation — monetising first-party data, customer relationships, physical estate and supplier access to create revenue streams beyond grocery margin.' },
  T6: { name:'The Better Food Enterprise', type:'Strategic', short:'Better Food Enterprise',
    desc:'Quality, freshness, health and waste reduction become structural operating principles woven through every stage of the value chain — from supplier selection through to shelf freshness management.' },
  T7: { name:'The AI-Empowered Enterprise', type:'Backbone', short:'AI-Empowered Enterprise',
    desc:'Sainsbury\'s reimagines itself as an AI-native organisation — redesigning roles, decision-making architecture, processes and ways of working from first principles around human-AI collaboration.' },
  T8: { name:'Data Foundations, Process and Trust', type:'Backbone', short:'Data & Trust',
    desc:'The data, process and governance infrastructure that determines the ceiling on every other territory. Unified data platforms, process re-engineering, AI governance frameworks, consent management and compliance built as structural capabilities.' }
};

const ACTIVITIES = [
  // Plan
  { phase:'Plan', num:'1.1', name:'Customer proposition and marketing planning',
    desc:'Defining and communicating Sainsbury\'s value proposition, brand positioning, marketing investment and promotional calendar across all channels.',
    territories: {
      T1:'Proposition is designed at customer-of-one level — marketing, pricing and recommendations all adapt to the individual, powered by hyper-local assortment intelligence and real-time Nectar signals.',
      T5:'Sainsbury\'s ability to offer media reach, first-party data and commerce infrastructure makes it a platform partner to suppliers, not just a retailer.',
      T6:'Health, quality and sustainability become structural proposition pillars — the territory shifts Sainsbury\'s from "food retailer with health options" to "enterprise built around better food", backed by evidence.',
      T7:'AI co-pilots surface competitive signals, customer trends and brand performance data at speed and scale human teams cannot match alone — augmenting the proposition design function.',
      T8:'Data foundations underpin every proposition decision — customer insight accuracy, brand performance data integrity and competitive signal quality all flow from T8 infrastructure.'
    }},
  { phase:'Plan', num:'1.2', name:'Range and assortment planning',
    desc:'Determining which SKUs to stock, in what volumes and in which stores or channels, balancing customer relevance, supplier terms and waste targets.',
    territories: {
      T1:'Hyper-local assortment intelligence shapes ranging by catchment; agent-readable range structure enables machine-mediated discovery alongside human browse.',

      T3:'AI Merchandising closes the loop from customer demand signals to range architecture — continuous AI-driven review replaces periodic manual ranging cycles.',
      T6:'Range architecture is the primary commercial expression — every tier evaluated against health, freshness and sustainability as structural requirements.',
      T7:'AI-assisted range planning allows category managers to evaluate NPD and exit decisions against broader data sets, building the foundation for autonomous range architecture.',
      T8:'The quality and governance of data flowing into ranging decisions directly determines the quality of range decisions. T8 builds the data quality standards that make AI-driven range intelligence trustworthy and auditable.'

  { phase:'Plan', num:'1.3', name:'Promo and trading planning',
    desc:'Designing and scheduling promotional mechanics — personalised offers, supplier-funded deals, multi-buys and seasonal trading events.',

// ── BUILD ─────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');
const panel = document.getElementById('panel');
const focusBanner = document.getElementById('focus-banner');
const focusLabel = document.getElementById('focus-label');

let activeFilter = 'all';

function getHeatColor(count) {
  if (count >= 6) return '#ef4444';
  if (count >= 5) return '#f97316';
  if (count >= 4) return '#f59e0b';
  if (count >= 3) return '#84cc16';
  return '#cbd5e1';
}

function getHeatOpacity(count) {
  return Math.min(1, 0.3 + count * 0.12);
}

// Group by phase
const byPhase = {};
PHASES.forEach(p => byPhase[p] = []);
ACTIVITIES.forEach(a => byPhase[a.phase].push(a));

PHASES.forEach(phase => {
  const col = document.createElement('div');
  col.className = 'phase-col';
  col.dataset.phase = phase;

  const hdr = document.createElement('div');
  hdr.className = 'phase-header';
  hdr.innerHTML = `${phase} <span class="phase-count">${byPhase[phase].length} activities</span>`;
  col.appendChild(hdr);

  const cards = document.createElement('div');
  cards.className = 'activity-cards';

  byPhase[phase].forEach(act => {
    const tList = Object.keys(act.territories);
    const count = tList.length;

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.num = act.num;
    card.style.setProperty('--heat-color', getHeatColor(count));
    card.style.setProperty('--heat-opacity', getHeatOpacity(count));

    card.innerHTML = `
      <div class="card-num">${act.num}</div>
      <div class="card-name">${act.name}</div>
      <div class="card-dots">${tList.map(t => `<div class="tdot" data-t="${t}">${t.replace('T','')}</div>`).join('')}</div>
      <div class="heat-badge">${count}</div>
    `;

    // Click card → open panel
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('tdot')) return;
      openPanel(act);
    });

    // Click tdot → filter by territory
    card.querySelectorAll('.tdot').forEach(dot => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        const t = dot.dataset.t;
        setFilter(t === activeFilter ? 'all' : t);
      });
    });

    cards.appendChild(card);
  });

  col.appendChild(cards);
  canvas.appendChild(col);
});

// ── FILTER ────────────────────────────────────────────────────────────────────

function setFilter(t) {
  activeFilter = t;

  // Update chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.t === t);
  });

  // Update cards
  document.querySelectorAll('.card').forEach(card => {
    const num = card.dataset.num;
    const act = ACTIVITIES.find(a => a.num === num);
    if (!act) return;
    const tList = Object.keys(act.territories);
    if (t === 'all') {
      card.classList.remove('dimmed', 'focused');
      card.style.removeProperty('--focus-color');
    } else if (tList.includes(t)) {
      card.classList.remove('dimmed');
      card.classList.add('focused');
      card.style.setProperty('--focus-color', T_COLORS[t]);
    } else {
      card.classList.add('dimmed');
      card.classList.remove('focused');
    }
  });

  // Focus banner
  if (t === 'all') {
    focusBanner.classList.remove('show');
  } else {
    focusLabel.textContent = `${t} · ${TERRITORIES[t].short}`;
    focusBanner.classList.add('show');
    focusBanner.style.background = T_COLORS[t];
  }
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => setFilter(chip.dataset.t));
});

focusBanner.addEventListener('click', () => setFilter('all'));

// ── TOOLTIP ───────────────────────────────────────────────────────────────────

let ttTarget = null;

document.querySelectorAll('.tdot').forEach(dot => {
  dot.addEventListener('mouseenter', (e) => {
    const t = dot.dataset.t;
    const ter = TERRITORIES[t];
    document.getElementById('tt-title').textContent = ter.name;
    document.getElementById('tt-type').textContent = ter.type;
    document.getElementById('tt-type').style.color = T_COLORS[t];
    document.getElementById('tt-body').textContent = ter.desc;
    tooltip.classList.add('visible');
    ttTarget = dot;
    positionTooltip(e);
  });
  dot.addEventListener('mousemove', positionTooltip);
  dot.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
    ttTarget = null;
  });
});

function positionTooltip(e) {
  const tw = tooltip.offsetWidth || 300;
  const th = tooltip.offsetHeight || 120;
  let x = e.clientX + 14;
  let y = e.clientY - 14;
  if (x + tw > window.innerWidth - 10) x = e.clientX - tw - 14;
  if (y + th > window.innerHeight - 10) y = e.clientY - th;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────

function openPanel(act) {
  document.getElementById('p-phase').textContent = act.phase;
  document.getElementById('p-phase').style.color = PHASE_COLORS[act.phase];
  document.getElementById('p-num').textContent = act.num;
  document.getElementById('p-name').textContent = act.name;
  document.getElementById('p-desc').textContent = act.desc;

  const container = document.getElementById('p-territories');
  container.innerHTML = '';

  Object.entries(act.territories).forEach(([t, desc]) => {
    const ter = TERRITORIES[t];
    const item = document.createElement('div');
    item.className = 'territory-item';
    item.innerHTML = `
      <div class="territory-pill" style="background:${T_COLORS[t]}">${t}</div>
      <div>
        <div class="territory-item-name">${ter.short}</div>
        <div class="territory-item-desc">${desc}</div>
      </div>
    `;
    container.appendChild(item);
  });

  panel.classList.add('open');
}

document.getElementById('panel-close').addEventListener('click', () => {
  panel.classList.remove('open');
});

canvas.addEventListener('click', (e) => {
  if (!e.target.closest('.card') && !e.target.closest('.panel')) {
    panel.classList.remove('open');
  }
});
</script>
